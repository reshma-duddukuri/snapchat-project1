<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Amazon Account</title>
  <style>
    /* body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 20px;
    } */

    .main-title {
      background-color: #232f3e;
      color: white; 
      padding: 15px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }
   
    .container {
      display: flex;
      justify-content: center;
    }
    .signup-box {
      background: white;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 4px;
      width: 400px;
    }
    .signup-box h2 {
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: normal;
    }
    .signup-box label {
      font-size: 14px;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    .signup-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #a6a6a6;
      border-radius: 3px;
      font-size: 14px;
    }
    .signup-box button {
      width: 100%;
      padding: 10px;
      background-color: #f0c14b;
      border: 1px solid #a88734;
      border-radius: 3px;
      font-size: 16px;
      cursor: pointer;
    }
    .signup-box button:hover {
      background-color: #e2b33c;
    }
    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }
    .link a {
      color: #0066c0;
      text-decoration: none;
    }
    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="main-title">Amazon Shopping</div>
  
  <div class="container">
    <div class="signup-box">
      <h2>Create Account</h2>
      <form action="index.html" method="get">
        <label for="name">Your name</label>
        <input type="text" id="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" required>

        <label for="repassword">Re-enter password</label>
        <input type="password" id="repassword" required>

        <button type="submit">Create your Amazon account</button>
      </form>
      <!-- <div class="link">
        <a href="login.html">Already have an account? Sign-In</a>
      </div> -->

      <div class="new-account">
    <p>New to Amazon?</p>
    <a href="index.html">signup</a>
    </div>
  </div>

  </div>
</body>
</html>
